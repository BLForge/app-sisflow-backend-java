services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sisflow}
      POSTGRES_USER: ${POSTGRES_USER:-sisflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sisflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sisflow} -d ${POSTGRES_DB:-sisflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ticket-service:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sisflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sisflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sisflow}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-30}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-localhost}
      APP_TRUST_HOST_HEADER: ${APP_TRUST_HOST_HEADER:-false}
      EMAIL_CONFIRMATION_EXPIRATION_HOURS: ${EMAIL_CONFIRMATION_EXPIRATION_HOURS:-24}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://blforge.localhost:5173,http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://*.localhost:8080}
      FILE_UPLOAD_BASE_DIR: /app/uploads
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@example.com}
      SPRING_CACHE_REDIS_TIME_TO_LIVE: ${SPRING_CACHE_REDIS_TIME_TO_LIVE:-10m}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: ${SPRING_DATA_REDIS_TIMEOUT:-2s}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-guest}
      SECURITY_LOGIN_MAX_ATTEMPTS: ${SECURITY_LOGIN_MAX_ATTEMPTS:-10}
      SECURITY_LOGIN_IP_MAX_ATTEMPTS: ${SECURITY_LOGIN_IP_MAX_ATTEMPTS:-50}
      SECURITY_LOGIN_RATE_LIMIT_CAPACITY: ${SECURITY_LOGIN_RATE_LIMIT_CAPACITY:-30}
      SECURITY_LOGIN_RATE_LIMIT_WINDOW_MINUTES: ${SECURITY_LOGIN_RATE_LIMIT_WINDOW_MINUTES:-1}
      SECURITY_LOGIN_LOCKOUT_DURATION_MINUTES: ${SECURITY_LOGIN_LOCKOUT_DURATION_MINUTES:-15}
      SECURITY_API_RATE_LIMIT_ENABLED: ${SECURITY_API_RATE_LIMIT_ENABLED:-true}
      SECURITY_API_RATE_LIMIT_USER_READ_CLIENT: ${SECURITY_API_RATE_LIMIT_USER_READ_CLIENT:-600}
      SECURITY_API_RATE_LIMIT_USER_WRITE_CLIENT: ${SECURITY_API_RATE_LIMIT_USER_WRITE_CLIENT:-120}
      SECURITY_API_RATE_LIMIT_USER_READ_DEVELOPER: ${SECURITY_API_RATE_LIMIT_USER_READ_DEVELOPER:-900}
      SECURITY_API_RATE_LIMIT_USER_WRITE_DEVELOPER: ${SECURITY_API_RATE_LIMIT_USER_WRITE_DEVELOPER:-180}
      SECURITY_API_RATE_LIMIT_USER_READ_MODERATOR: ${SECURITY_API_RATE_LIMIT_USER_READ_MODERATOR:-1200}
      SECURITY_API_RATE_LIMIT_USER_WRITE_MODERATOR: ${SECURITY_API_RATE_LIMIT_USER_WRITE_MODERATOR:-240}
      SECURITY_API_RATE_LIMIT_USER_READ_ADMIN: ${SECURITY_API_RATE_LIMIT_USER_READ_ADMIN:-1800}
      SECURITY_API_RATE_LIMIT_USER_WRITE_ADMIN: ${SECURITY_API_RATE_LIMIT_USER_WRITE_ADMIN:-360}
      SECURITY_API_RATE_LIMIT_TENANT_READ: ${SECURITY_API_RATE_LIMIT_TENANT_READ:-3000}
      SECURITY_API_RATE_LIMIT_TENANT_WRITE: ${SECURITY_API_RATE_LIMIT_TENANT_WRITE:-900}
      SECURITY_API_RATE_LIMIT_API_KEY_READ: ${SECURITY_API_RATE_LIMIT_API_KEY_READ:-1200}
      SECURITY_API_RATE_LIMIT_API_KEY_WRITE: ${SECURITY_API_RATE_LIMIT_API_KEY_WRITE:-300}
      NOTIFICATIONS_EXCHANGE: ${NOTIFICATIONS_EXCHANGE:-sisflow.notifications}
      NOTIFICATIONS_EMAIL_ROUTING_KEY: ${NOTIFICATIONS_EMAIL_ROUTING_KEY:-email.auth}
    ports:
      - "${TICKET_SERVICE_PORT:-8080}:9090"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  auth-service:
    build:
      context: ./services/auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sisflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sisflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-sisflow}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-env}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-30}
      APP_BASE_DOMAIN: ${APP_BASE_DOMAIN:-localhost}
      EMAIL_CONFIRMATION_EXPIRATION_HOURS: ${EMAIL_CONFIRMATION_EXPIRATION_HOURS:-24}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: ${SPRING_DATA_REDIS_TIMEOUT:-2s}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-guest}
      SECURITY_LOGIN_MAX_ATTEMPTS: ${SECURITY_LOGIN_MAX_ATTEMPTS:-10}
      SECURITY_LOGIN_IP_MAX_ATTEMPTS: ${SECURITY_LOGIN_IP_MAX_ATTEMPTS:-50}
      SECURITY_LOGIN_RATE_LIMIT_CAPACITY: ${SECURITY_LOGIN_RATE_LIMIT_CAPACITY:-30}
      SECURITY_LOGIN_RATE_LIMIT_WINDOW_MINUTES: ${SECURITY_LOGIN_RATE_LIMIT_WINDOW_MINUTES:-1}
      SECURITY_LOGIN_LOCKOUT_DURATION_MINUTES: ${SECURITY_LOGIN_LOCKOUT_DURATION_MINUTES:-15}
      NOTIFICATIONS_EXCHANGE: ${NOTIFICATIONS_EXCHANGE:-sisflow.notifications}
      NOTIFICATIONS_EMAIL_ROUTING_KEY: ${NOTIFICATIONS_EMAIL_ROUTING_KEY:-email.auth}
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  notification-service:
    build:
      context: ./services/notification-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@example.com}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD:-guest}
      NOTIFICATIONS_EXCHANGE: ${NOTIFICATIONS_EXCHANGE:-sisflow.notifications}
      NOTIFICATIONS_EMAIL_QUEUE: ${NOTIFICATIONS_EMAIL_QUEUE:-notification.email.auth}
      NOTIFICATIONS_EMAIL_ROUTING_KEY: ${NOTIFICATIONS_EMAIL_ROUTING_KEY:-email.auth}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8082}:9092"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9092/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  postgres_data:
  backend_uploads:
