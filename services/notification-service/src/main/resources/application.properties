spring.application.name=notification-service
server.port=9092

logging.level.root=WARN
logging.level.io.snortexware=INFO

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

notifications.exchange=${NOTIFICATIONS_EXCHANGE:sisflow.notifications}
notifications.email.queue=${NOTIFICATIONS_EMAIL_QUEUE:notification.email.auth}
notifications.ticket.queue=${NOTIFICATIONS_TICKET_QUEUE:notification.ticket.transfer}
notifications.email.routing-key=${NOTIFICATIONS_EMAIL_ROUTING_KEY:email.auth}
notifications.ticket.routing-key=${NOTIFICATIONS_TICKET_ROUTING_KEY:ticket.transfer}
notifications.sse.heartbeat-ms=${NOTIFICATIONS_SSE_HEARTBEAT_MS:25000}
jwt.secret=${JWT_SECRET}
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://blforge.localhost:5173}

resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:noreply@example.com}
app.base.url=${APP_BASE_URL:http://localhost:5173}
