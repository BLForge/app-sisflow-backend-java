spring.application.name=auth-service
server.port=9091

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

logging.level.root=WARN
logging.level.io.snortexware=INFO

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

app.base.domain=${APP_BASE_DOMAIN:localhost}

email.confirmation.expiration-hours=${EMAIL_CONFIRMATION_EXPIRATION_HOURS:24}
security.login.max-attempts=${SECURITY_LOGIN_MAX_ATTEMPTS:10}
security.login.ip-max-attempts=${SECURITY_LOGIN_IP_MAX_ATTEMPTS:50}
security.login.rate-limit-capacity=${SECURITY_LOGIN_RATE_LIMIT_CAPACITY:30}
security.login.rate-limit-window-minutes=${SECURITY_LOGIN_RATE_LIMIT_WINDOW_MINUTES:1}
security.login.lockout-duration-minutes=${SECURITY_LOGIN_LOCKOUT_DURATION_MINUTES:15}

notifications.exchange=${NOTIFICATIONS_EXCHANGE:sisflow.notifications}
notifications.email.routing-key=${NOTIFICATIONS_EMAIL_ROUTING_KEY:email.auth}
