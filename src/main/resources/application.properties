spring.application.name=sisflow
server.port=9090

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.flywaydb=DEBUG

# Silence the rest
logging.level.root=DEBUG

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.connection-init-sql=SET search_path TO public

app.base.url=${APP_BASE_URL:https://ticket.lucasmoreira.cc}
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:noreply@lucasmoreira.cc}
email.confirmation.expiration-hours=${EMAIL_CONFIRMATION_EXPIRATION_HOURS:24}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}
development.enviroment="true"

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db.migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true
spring.flyway.default-schema=public
spring.flyway.schemas=public


# Disable Swagger in production
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
# CORS allowed origins (comma-separated)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://ticket.lucasmoreira.cc, http://blforge.localhost:8080, http://localhost:5173,http://localhost:3000,http://localhost:8080}
cors.allowed.origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://*.localhost:5173,http://*.localhost:3000,http://*.localhost:8080}
