spring.application.name=sisflow
server.port=9090

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# Silence the rest
logging.level.root=DEBUG

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
supabase.jwks.url=${SUPABASE_JWKS_URL:https://wlwluotgprraezzgnnbb.supabase.co/auth/v1/.well-known/jwks.json}
supabase.url=${SUPABASE_URL:https://wlwluotgprraezzgnnbb.supabase.co}
supabase.anon.key=${SUPABASE_ANON_KEY:}
supabase.storage.url=${SUPABASE_STORAGE_URL:https://wlwluotgprraezzgnnbb.supabase.co/storage/v1}
app.base.url=${APP_BASE_URL:https://ticket.lucasmoreira.cc}
development.enviroment="true"

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
spring.flyway.repair-on-migrate=false
spring.flyway.ignore-missing-migrations=false
spring.flyway.ignore-ignored-migrations=true
spring.flyway.ignore-pending-migrations=false
spring.flyway.ignore-future-migrations=true

# Disable Swagger in production
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
# CORS allowed origins (comma-separated)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://ticket.lucasmoreira.cc,http://localhost:5173,http://localhost:3000,http://localhost:8080}
