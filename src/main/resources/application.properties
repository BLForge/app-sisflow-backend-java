spring.application.name=sisflow
server.port=9090
spring.profiles.default=prod

# Never expose internal error details in HTTP responses
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.flywaydb=WARN

# Silence the rest
logging.level.root=WARN
logging.level.io.snortexware=INFO

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.connection-init-sql=SET search_path TO public

app.base.url=${APP_BASE_URL:http://localhost:9090}
app.base.domain=${APP_BASE_DOMAIN:localhost}
# Set to true only when behind a trusted reverse proxy (production)
app.trust-host-header=${APP_TRUST_HOST_HEADER:false}

# Do NOT use framework forward-headers-strategy — it would trust CF-Connecting-IP
# from ANY source, not just from nginx/CF. IP trust is handled manually in filters.
server.forward-headers-strategy=none

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:noreply@example.com}
email.confirmation.expiration-hours=${EMAIL_CONFIRMATION_EXPIRATION_HOURS:24}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db.migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true
spring.flyway.default-schema=public
spring.flyway.schemas=public

spring.cache.type=redis
spring.cache.redis.time-to-live=${SPRING_CACHE_REDIS_TIME_TO_LIVE:10m}
spring.cache.redis.cache-null-values=false
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2s}

# Disable Swagger in production
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
# CORS allowed origins — production must set CORS_ALLOWED_ORIGINS explicitly
# Local dev default includes localhost origins; production env var overrides this entirely
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
cors.allowed.origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://*.localhost:8080}

# Rate Limiting & Account Lockout
security.api-rate-limit.enabled=true
security.api-rate-limit.user.read.client=600
security.api-rate-limit.user.write.client=120
security.api-rate-limit.user.read.developer=900
security.api-rate-limit.user.write.developer=180
security.api-rate-limit.user.read.moderator=1200
security.api-rate-limit.user.write.moderator=240
security.api-rate-limit.user.read.admin=1800
security.api-rate-limit.user.write.admin=360
security.api-rate-limit.tenant.read=3000
security.api-rate-limit.tenant.write=900
security.api-rate-limit.api-key.read=1200
security.api-rate-limit.api-key.write=300
security.login.max-attempts=10
security.login.ip-max-attempts=50
security.login.rate-limit-capacity=30
security.login.rate-limit-window-minutes=1
security.login.lockout-duration-minutes=15

# File Upload
file.upload.base-dir=${FILE_UPLOAD_BASE_DIR:./uploads}
file.download.token.ttl-seconds=${FILE_DOWNLOAD_TOKEN_TTL_SECONDS:60}
file.download.token.issue-limit-per-minute=${FILE_DOWNLOAD_TOKEN_ISSUE_LIMIT_PER_MINUTE:60}
file.download.token.resolve-limit-per-minute=${FILE_DOWNLOAD_TOKEN_RESOLVE_LIMIT_PER_MINUTE:180}
file.accel.redirect.prefix=${FILE_ACCEL_REDIRECT_PREFIX:/_protected_files}
